[settings]
mouse_mode = true
data_compact_columns = true
data_row_spacer = false

[db]
local-postgres = { host = "localhost", driver = "postgres", port = 5432, database = "postgres", username = "postgres", default = true }

[keybindings.Menu]
"q" = "Quit"
"<Ctrl-q>" = "AbortQuery"
"<Ctrl-1>" = "FocusMenu"
"<Ctrl-2>" = "FocusEditor"
"<Ctrl-3>" = "FocusData"
"<Ctrl-4>" = "FocusHistory"
"<Ctrl-5>" = "FocusFavorites"
"<Ctrl-k>" = "FocusMenu"
"<Ctrl-j>" = "FocusEditor"
"<Ctrl-h>" = "FocusData"
"<Ctrl-g>" = "FocusHistory"
"<Ctrl-m>" = "FocusFavorites"
"<Tab>" = "CycleFocusForwards"
"<Backtab>" = "CycleFocusBackwards"

[keybindings.Editor]
"<Ctrl-q>" = "AbortQuery"
