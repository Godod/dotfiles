[[language]]
name = "html"
formatter = { command = "npx", args = ["prettier", "--parser", "html"] }

[[language]]
name = "json"
formatter = { command = "npx", args = ["prettier", "--parser", "json"] }

[[language]]
name = "css"
formatter = { command = "npx", args = ["prettier", "--parser", "css"] }

[[language]]
name = "javascript"
formatter = { command = "npx", args = ["prettier", "--parser", "typescript", "--tab-width", "2"]}
auto-format = true

[[language]]
name = "typescript"
formatter = { command = "npx", args = ["prettier", "--parser", "typescript"] }
auto-format = true

[[language]]
name = "tsx"
formatter = { command = "npx", args = ["prettier", "--parser", "typescript"] }
auto-format = true

[[language]]
name = "python"
formatter = { command = "ruff", args = ["format", "-"] }
language-servers = ["basedpyright", "ruff"]
auto-format = true

[language-server.bzl]
command = "bzl"
args = ["lsp", "serve"]

[[language]]
name = "starlark"
language-servers = ["bzl"]
auto-format = true

[[language]]
name = "rust"
formatter = { command = "rustfmt" }
auto-format = true

[language.debugger]
name = "lldb"
transport = "stdio"
command = "lldb-dap"

[[language.debugger.templates]]
name = "binary"
request = "launch"
completion = [ { name = "binary", completion = "filename" } ]
args = { program = "{0}", initCommands = [ "command script import /usr/local/etc/rust_lldb_rustc_primer.py" ] }

# Define the VSCode JSON language server binary
[language-server.vscode-json-language-server]
command = "vscode-json-language-server"
args = ["--stdio"]

# Configure the LSP to enable validation and formatting
[language-server.vscode-json-language-server.config]
provideFormatter = true
json = { validate = { enable = true }, format = { enable = true } }

# Map the language server to JSONC files
[[language]]
name = "jsonc"
language-servers = ["vscode-json-language-server"]
auto-format = true
