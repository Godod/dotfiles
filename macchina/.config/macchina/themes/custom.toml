# Specify which system information readouts to display
show = [
    "Host",
    "Machine",
    "Kernel",
    "Distribution",
    "DesktopEnvironment",
    "WindowManager",
    "Packages",
    "Shell",
    "Terminal",
    "Uptime",
    "Processor",
    "ProcessorUsage",
    "Memory",
    "Battery"
]

# Set styling elements based on the working example (mezora.toml)
# We use the Arch Linux Nerd Font glyph as a separator
separator = ""
separator_color = "cyan"
key_color = "cyan"
prefer_small_ascii = false

[palette]
type = "Dark"
visible = true
glyph = " ⬤ "

[box]
title = " custom "
border = "double"
visible = true

[bar]
glyph = "▮ "
hide_delimiters = true
visible = true

[randomize]
key_color = false
separator_color = false

[custom_ascii]
color = "cyan"
path = "~/.config/macchina/themes/ascii-arch.txt"

# Modern icons using Nerd Fonts for a sleek terminal experience
[keys]
host = "⌂ host"
kernel = "△ kernel"
distro = " distro"
packages = " packages"
terminal = " terminal"
shell = " shell"
cpu = " cpu"
cpu_load = " load"
memory = "⏛ memory"
battery = "⌁ battery"
de = " DE"
wm = "󰐂 WM"
uptime = "󰔚 uptime"
machine = "󰍹 machine"
